name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run game tests
        run: npm test

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  deploy:
    runs-on: ubuntu-latest
    needs: lint-and-test
    environment: PROD
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Stamp build version
        run: echo "var BUILD_VERSION = '$(date +%Y-%m-%d)-${GITHUB_SHA::7}';" > src/version.js

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy src/ --project-name=diving-simulator --branch=main

  release:
    runs-on: ubuntu-latest
    needs: deploy
    permissions:
      contents: write
      pull-requests: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create semver release from merged PR label
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          pr_json="$(
            gh api \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "/repos/${GITHUB_REPOSITORY}/commits/${GITHUB_SHA}/pulls" \
              --jq '[.[] | select(.merged_at != null) | {number, labels}]'
          )"
          pr_count="$(printf '%s' "$pr_json" | jq 'length')"

          if [ "$pr_count" -ne 1 ]; then
            echo "::error::Could not find exactly one merged PR for commit $GITHUB_SHA."
            exit 1
          fi

          release_label="$(
            printf '%s' "$pr_json" |
              jq -r '.[0].labels[].name | select(. == "release:major" or . == "release:minor" or . == "release:patch" or . == "release:none")'
          )"
          label_count="$(printf '%s\n' "$release_label" | sed '/^$/d' | wc -l | tr -d ' ')"

          if [ "$label_count" -ne 1 ]; then
            echo "::error::Merged PR must have exactly one release label. Found: $release_label"
            exit 1
          fi

          if [ "$release_label" = "release:none" ]; then
            echo "release:none selected; skipping GitHub release."
            exit 0
          fi

          latest_tag="$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n 1)"
          if [ -z "$latest_tag" ]; then
            latest_tag="v0.0.0"
          fi

          version="${latest_tag#v}"
          IFS='.' read -r major minor patch <<< "$version"

          case "$release_label" in
            release:major)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            release:minor)
              minor=$((minor + 1))
              patch=0
              ;;
            release:patch)
              patch=$((patch + 1))
              ;;
          esac

          next_tag="v${major}.${minor}.${patch}"

          if git rev-parse "$next_tag" >/dev/null 2>&1; then
            echo "::error::Tag $next_tag already exists."
            exit 1
          fi

          pr_number="$(printf '%s' "$pr_json" | jq -r '.[0].number')"
          pr_details="$(gh pr view "$pr_number" --json title,body,url,author,labels)"
          pr_title="$(printf '%s' "$pr_details" | jq -r '.title')"
          pr_body="$(printf '%s' "$pr_details" | jq -r '.body // ""')"
          pr_url="$(printf '%s' "$pr_details" | jq -r '.url')"
          pr_author="$(printf '%s' "$pr_details" | jq -r '.author.login')"
          pr_labels="$(printf '%s' "$pr_details" | jq -r '[.labels[].name] | join(", ")')"
          commit_subject="$(git log -1 --format=%s "$GITHUB_SHA")"
          commit_body="$(git log -1 --format=%b "$GITHUB_SHA")"
          short_sha="${GITHUB_SHA::7}"

          {
            echo "## What's Changed"
            echo
            echo "- ${pr_title} (#${pr_number}) by @${pr_author}"
            echo
            echo "## PR Description"
            echo
            if [ -n "$pr_body" ]; then
              printf '%s\n' "$pr_body"
            else
              echo "_No PR description provided._"
            fi
            echo
            echo "## Commit Message"
            echo
            echo "### ${commit_subject}"
            if [ -n "$commit_body" ]; then
              echo
              printf '%s\n' "$commit_body"
            fi
            echo
            echo "## Release Details"
            echo
            echo "- Version: \`${next_tag}\`"
            echo "- Bump: \`${release_label#release:}\`"
            echo "- Previous version: \`${latest_tag}\`"
            echo "- Commit: \`${short_sha}\`"
            echo "- PR: ${pr_url}"
            echo "- Labels: ${pr_labels}"
            echo
            echo "_Created automatically after successful production deployment._"
          } > release-notes.md

          gh release create "$next_tag" \
            --target "$GITHUB_SHA" \
            --title "$next_tag" \
            --notes-file release-notes.md
