name: PR Checks

# Runs on every pull request targeting main: lint, the game test suite, and a
# set of review screenshots. Deployment lives in deploy.yml and only runs on
# push to main (i.e. after a PR is merged) — nothing here deploys.
on:
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run game tests
        run: npm test

      - name: Generate review screenshots
        run: npm run screenshots

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: review-screenshots
          path: screenshots/
          retention-days: 14

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
