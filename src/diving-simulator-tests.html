* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0a0e17;
    color: #e0e6f0;
    padding: 24px;
    min-height: 100vh;
}
h1 {
    font-size: 1.6rem;
    margin-bottom: 8px;
    color: #7ec8f8;
}
.subtitle {
    color: #6b7a8d;
    margin-bottom: 20px;
    font-size: 0.9rem;
}
.controls {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 20px;
}
button {
    background: #1a2233;
    color: #c0cfe0;
    border: 1px solid #2a3a50;
    padding: 8px 16px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.85rem;
    transition: background 0.15s, border-color 0.15s;
}
button:hover { background: #243044; border-color: #3a5070; }
button.primary {
    background: #1a6b3a;
    border-color: #28a060;
    color: #d0ffd8;
    font-weight: 600;
    padding: 10px 24px;
    font-size: 0.95rem;
}
button.primary:hover { background: #208548; }
button:disabled { opacity: 0.4; cursor: not-allowed; }
.summary {
    margin-bottom: 16px;
    padding: 12px 16px;
    background: #111827;
    border-radius: 8px;
    border: 1px solid #1e293b;
    font-size: 0.95rem;
}
.summary .pass { color: #4ade80; font-weight: 600; }
.summary .fail { color: #f87171; font-weight: 600; }
.summary .pending { color: #6b7a8d; }
.results {
    display: grid;
    gap: 12px;
}
.card {
    background: #111827;
    border: 1px solid #1e293b;
    border-radius: 8px;
    padding: 14px 18px;
    transition: border-color 0.2s;
}
.card.pass { border-left: 4px solid #4ade80; }
.card.fail { border-left: 4px solid #f87171; }
.card.running { border-left: 4px solid #facc15; }
.card.pending { border-left: 4px solid #334155; }
.card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
}
.card-title { font-weight: 600; font-size: 0.95rem; }
.badge {
    padding: 2px 10px;
    border-radius: 12px;
    font-size: 0.75rem;
    font-weight: 700;
    text-transform: uppercase;
}
.badge.pass { background: #14532d; color: #4ade80; }
.badge.fail { background: #7f1d1d; color: #f87171; }
.badge.running { background: #713f12; color: #facc15; }
.badge.pending { background: #1e293b; color: #64748b; }
.card-detail {
    font-size: 0.82rem;
    color: #8896a8;
    white-space: pre-wrap;
    margin-top: 4px;
    line-height: 1.5;
}
iframe { display: none; }

<script>
// ============================================================
//  TEST HARNESS
// ============================================================

var api = null;
var tests = [];
var results = {};
var running = false;

var iframe = document.getElementById('gameFrame');
iframe.addEventListener('load', function() {
    api = iframe.contentWindow.gameAPI;
    if (!api) {
        document.getElementById('summary').innerHTML = '<span class="fail">ERROR: gameAPI not found on iframe.contentWindow</span>';
        return;
    }
    document.getElementById('summary').innerHTML = '<span class="pending">Ready — click Run All Tests or an individual test.</span>';
    document.getElementById('btnRunAll').disabled = false;
    var btns = document.querySelectorAll('.individual');
    for (var i = 0; i < btns.length; i++) btns[i].disabled = false;
});

// Helpers
function setupDive(tankList) {
    // resetDive does NOT call initTanks — it only resets gasRemaining on existing tanks.
    // We must manually clear the tanks array before pushing test tanks.
    api.tanks.length = 0;
    api.tankCount = 0;
    api.resetDive();
    // Freeze the shark timer so random shark spawns cannot interfere with non-shark tests.
    // Shark-specific tests (TC-17..TC-21) override these directly.
    api.shark = null;
    api.sharkTimer = 1e9;
    for (var i = 0; i < tankList.length; i++) {
        var t = tankList[i];
        api.pushTank(t[0], t[1], t[2]);
    }
    api.activeTank = 0;
    api.gameState = 'diving';
}

function runFrames(n, dtReal, holdDepth) {
    if (dtReal === undefined) dtReal = 0.033;
    for (var i = 0; i < n; i++) {
        if (holdDepth !== undefined) api.setDepth(holdDepth);
        api.updateDiving(dtReal);
        if (api.gameState === 'gameover' || api.gameState === 'post-dive') break;
    }
}

function assert(condition, msg) {
    if (!condition) throw new Error('ASSERT FAILED: ' + msg);
}

function approx(a, b, tol) {
    if (tol === undefined) tol = 0.05;
    return Math.abs(a - b) <= tol;
}

// ============================================================
//  TEST DEFINITIONS
// ============================================================

tests = [
    // ----------------------------------------------------------
    // TC-01: Basic Air Dive
    // ----------------------------------------------------------
    {
        id: 'TC-01',
        name: 'Basic Air Dive — 18m, 30min, ascend safely',
        fn: function() {
            setupDive([[0.21, 0, 200]]);

            // Descend & teleport to 18m
            api.setDepth(18);
            api.clearKeys();

            // Hold at 18m for 30 dive-minutes
            // frames = 30*60 / (0.033*3) ≈ 18182 — too many at 0.033.
            // Use larger dt: 0.5 real → 1.5 dive-sec/frame → 30*60/1.5 = 1200 frames
            var ndlOk = true;
            for (var i = 0; i < 1200; i++) {
                api.setDepth(18);
                api.updateDiving(0.5);
                if (api.gameState !== 'diving') {
                    return 'Game ended prematurely at frame ' + i + ': ' + api.gameState + ' — ' + api.gameOverReason;
                }
                if (api.calculateNDL() <= 0) { ndlOk = false; break; }
            }

            assert(api.gameState === 'diving', 'gameState should be diving, got ' + api.gameState);
            // NDL at 18m on air should last well beyond 30 min (NDL ~56min)
            assert(ndlOk, 'NDL should remain > 0 throughout 30min at 18m');

            // Controlled ascent — vent when rising too fast, add a touch of gas
            // when too slow, so the rate stays in a safe band (well under the
            // 18 m/min barotrauma threshold). Holding W the whole way would now
            // over-inflate and cause a runaway ascent (intended behaviour).
            for (var j = 0; j < 8000; j++) {
                if (api.ascentRate > 8)       api.setKeys({ w: false, s: true });
                else if (api.ascentRate < 3)  api.setKeys({ w: true,  s: false });
                else                          api.setKeys({ w: false, s: false });
                api.updateDiving(0.033);
                if (api.depth < 0.3) break;
            }
            api.clearKeys();

            // Should reach surface without game-over
            assert(api.gameState !== 'gameover', 'Should not game over on basic air dive, reason: ' + api.gameOverReason);
            assert(api.depth < 1, 'Should reach near surface, depth=' + api.depth.toFixed(1));

            return 'PASS — Held 18m for 30min (NDL stayed positive), ascended safely. Final depth: ' + api.depth.toFixed(1) + 'm';
        }
    },
    // ----------------------------------------------------------
    // TC-02: NDL Exhaustion
    // ----------------------------------------------------------
    {
        id: 'TC-02',
        name: 'NDL Exhaustion — 30m until NDL=0',
        fn: function() {
            setupDive([[0.21, 0, 200]]);
            api.setDepth(30);
            api.clearKeys();

            var frameCount = 0;
            var maxFrames = 50000;
            // Use dt=0.5 for speed: 1.5 dive-sec/frame
            while (frameCount < maxFrames) {
                api.setDepth(30);
                api.updateDiving(0.5);
                frameCount++;
                if (api.gameState !== 'diving') break;
                if (api.calculateNDL() <= 0) break;
            }

            var ndl = api.calculateNDL();
            assert(ndl === 0, 'NDL should reach 0, got ' + ndl);

            // NDL=0 means tissue will exceed surface limit within 0.5 min.
            // Run a few more frames at depth to push tissue loading past the limit.
            for (var j = 0; j < 30; j++) {
                api.setDepth(30);
                api.updateDiving(0.5);
                if (api.gameState !== 'diving') break;
            }

            var ceiling = api.calculateCeiling();
            var diveMin = api.diveTime;

            assert(ceiling > 0, 'Ceiling should be > 0 after continued time at depth past NDL=0, got ' + ceiling.toFixed(1));

            return 'PASS — NDL reached 0, continued at depth → ceiling: ' + ceiling.toFixed(1) + 'm after ' + diveMin.toFixed(1) + ' dive-min at 30m';
        }
    },
    // ----------------------------------------------------------
    // TC-03: O2 Toxicity
    // ----------------------------------------------------------
    {
        id: 'TC-03',
        name: 'O2 Toxicity — EAN32 at 70m',
        fn: function() {
            setupDive([[0.32, 0, 200]]);
            api.setDepth(70);
            api.clearKeys();

            // PO2 = 0.32 * 8 = 2.56 — well above 1.6
            var po2 = api.calculatePO2();
            assert(po2 > 1.6, 'PO2 at 70m should be > 1.6, got ' + po2.toFixed(2));

            // Run frames until game-over (PO2_TOXICITY_TIME = 30 dive-sec)
            // dt=0.5 → 1.5 dive-sec/frame → ~20 frames needed
            for (var i = 0; i < 200; i++) {
                api.setDepth(70);
                api.updateDiving(0.5);
                if (api.gameState === 'gameover') break;
            }

            assert(api.gameState === 'gameover', 'Game should end from O2 toxicity, state=' + api.gameState);
            assert(api.gameOverReason.indexOf('O2 TOXICITY') >= 0, 'Reason should mention O2 TOXICITY, got: ' + api.gameOverReason);

            return 'PASS — PO2=' + po2.toFixed(2) + ', game over: ' + api.gameOverReason;
        }
    },
    // ----------------------------------------------------------
    // TC-04: Gas Depletion
    // ----------------------------------------------------------
    {
        id: 'TC-04',
        name: 'Gas Depletion — Air at 40m until empty',
        fn: function() {
            setupDive([[0.21, 0, 200]]);
            api.setDepth(40);
            api.clearKeys();

            // Gas at 40m: SAC=15, Pamb=5, consumption=75 L/min. Tank=2400L → ~32 min.
            // dt=0.5 → 1.5 dive-sec/frame → 32*60/1.5 ≈ 1280 frames
            for (var i = 0; i < 2000; i++) {
                api.setDepth(40);
                api.updateDiving(0.5);
                if (api.gameState === 'gameover') break;
            }

            assert(api.gameState === 'gameover', 'Game should end from gas depletion, state=' + api.gameState);
            assert(api.gameOverReason === 'OUT OF GAS', 'Reason should be OUT OF GAS, got: ' + api.gameOverReason);

            var gasLeft = api.tanks[0].gasRemaining;
            return 'PASS — Gas depleted at 40m after ' + api.diveTime.toFixed(1) + ' dive-min. Remaining: ' + gasLeft.toFixed(1) + 'L. Reason: ' + api.gameOverReason;
        }
    },
    // ----------------------------------------------------------
    // TC-05: Safe Ascent
    // ----------------------------------------------------------
    {
        id: 'TC-05',
        name: 'Safe Ascent — 20m, 10min hold, ascend to surface',
        fn: function() {
            setupDive([[0.21, 0, 200]]);
            api.setDepth(20);
            api.clearKeys();

            // Hold at 20m for 10 dive-minutes: 10*60/1.5 = 400 frames at dt=0.5
            for (var i = 0; i < 400; i++) {
                api.setDepth(20);
                api.updateDiving(0.5);
                if (api.gameState !== 'diving') {
                    return 'FAIL — Game ended during hold: ' + api.gameState + ' — ' + api.gameOverReason;
                }
            }

            // Ascend using w key at normal dt for realistic rate (~9m/min)
            api.setKeys({w: true});
            var reachedSurface = false;
            for (var j = 0; j < 5000; j++) {
                api.updateDiving(0.033);
                if (api.depth < 0.3) { reachedSurface = true; break; }
                if (api.gameState === 'gameover') {
                    return 'FAIL — Game over during ascent: ' + api.gameOverReason;
                }
                if (api.gameState === 'post-dive') { reachedSurface = true; break; }
            }
            api.clearKeys();

            assert(reachedSurface, 'Should reach surface, depth=' + api.depth.toFixed(1));
            assert(api.gameState !== 'gameover', 'Should not game over, reason: ' + api.gameOverReason);

            return 'PASS — Held 20m for 10min, ascended safely. Final state: ' + api.gameState + ', depth: ' + api.depth.toFixed(1) + 'm';
        }
    },
    // ----------------------------------------------------------
    // TC-06: DCS — Ceiling Violation
    // ----------------------------------------------------------
    {
        id: 'TC-06',
        name: 'DCS — Ceiling Violation (40m→0m skip)',
        fn: function() {
            setupDive([[0.21, 0, 200]]);
            api.setDepth(40);
            api.clearKeys();

            // Hold at 40m for 30 dive-minutes to build deco obligation
            // 30*60/1.5 = 1200 frames at dt=0.5
            for (var i = 0; i < 1200; i++) {
                api.setDepth(40);
                api.updateDiving(0.5);
                if (api.gameState !== 'diving') {
                    return 'FAIL — Game ended during hold: ' + api.gameState + ' — ' + api.gameOverReason;
                }
            }

            var ceiling = api.calculateCeiling();
            // Teleport to surface — massive ceiling violation
            api.setDepth(0);

            // Run frames at surface — DCS_VIOLATION_TIME = 60 dive-sec → 60/1.5 = 40 frames
            for (var j = 0; j < 200; j++) {
                api.setDepth(0);
                api.updateDiving(0.5);
                if (api.gameState === 'gameover') break;
            }

            assert(api.gameState === 'gameover', 'Game should end from DCS, state=' + api.gameState);
            assert(api.gameOverReason === 'DECOMPRESSION SICKNESS', 'Reason should be DCS, got: ' + api.gameOverReason);

            return 'PASS — After 30min at 40m (ceiling=' + ceiling.toFixed(1) + 'm), teleported to 0m → ' + api.gameOverReason;
        }
    },
    // ----------------------------------------------------------
    // TC-07: Gas Switch
    // ----------------------------------------------------------
    {
        id: 'TC-07',
        name: 'Gas Switch — Air + EAN36 at 25m',
        fn: function() {
            setupDive([[0.21, 0, 200], [0.36, 0, 200]]);
            api.setDepth(25);
            api.clearKeys();
            api.updateDiving(0.033);

            // Check PO2 on Air at 25m: 0.21 * 3.5 = 0.735
            var po2Air = api.calculatePO2();
            assert(approx(po2Air, 0.735, 0.05), 'PO2 on Air at 25m should be ~0.735, got ' + po2Air.toFixed(3));

            // Switch to EAN36
            api.setActiveTankIdx(1);
            var po2Ean = api.calculatePO2();
            // 0.36 * 3.5 = 1.26
            assert(approx(po2Ean, 1.26, 0.05), 'PO2 on EAN36 at 25m should be ~1.26, got ' + po2Ean.toFixed(3));

            // recommendBestGas: EAN36 has PO2=1.26 ≤ 1.4, higher O2 than Air → should recommend tank 1
            var best = api.recommendBestGas();
            assert(best === 1, 'recommendBestGas should return 1 (EAN36), got ' + best);

            return 'PASS — Air PO2=' + po2Air.toFixed(3) + ', EAN36 PO2=' + po2Ean.toFixed(3) + ', bestGas=tank ' + best;
        }
    },
    // ----------------------------------------------------------
    // TC-08: Trimix Deep Dive
    // ----------------------------------------------------------
    {
        id: 'TC-08',
        name: 'Trimix Deep Dive — Tx18/45 at 60m',
        fn: function() {
            setupDive([[0.18, 0.45, 200]]);
            api.setDepth(60);
            api.clearKeys();

            // Hold at 60m for 5 dive-minutes: 5*60/1.5 = 200 frames at dt=0.5
            for (var i = 0; i < 200; i++) {
                api.setDepth(60);
                api.updateDiving(0.5);
                if (api.gameState !== 'diving') {
                    return 'FAIL — Game ended during hold: ' + api.gameState + ' — ' + api.gameOverReason;
                }
            }

            // Validate He loading > 0
            var heLoaded = false;
            var tissHe = api.tissuesHe;
            for (var j = 0; j < 16; j++) {
                if (tissHe[j] > 0.01) { heLoaded = true; break; }
            }
            assert(heLoaded, 'He tissues should have loaded (> 0.01)');

            // N2 loading should be less than air-equivalent at 60m
            // Air at 60m: piN2 = (7 - 0.0627) * 0.79 ≈ 5.48
            // Tx18/45: fN2 = 1 - 0.18 - 0.45 = 0.37, piN2 = (7 - 0.0627) * 0.37 ≈ 2.57
            // Fast tissue (comp 0, ht=5min) should be near piN2 after 5 min
            var fastN2 = api.tissues[0];
            assert(fastN2 < 4.0, 'Fast tissue N2 on Tx18/45 should be < 4.0 (air would be ~5.5), got ' + fastN2.toFixed(2));

            var fastHe = tissHe[0];
            return 'PASS — After 5min at 60m on Tx18/45: N2[0]=' + fastN2.toFixed(2) + ', He[0]=' + fastHe.toFixed(2) + ' (He loading confirmed)';
        }
    },
    // ----------------------------------------------------------
    // TC-09: Safety Stop
    // ----------------------------------------------------------
    {
        id: 'TC-09',
        name: 'Safety Stop — triggered at 5m after 20m dive',
        fn: function() {
            setupDive([[0.21, 0, 200]]);
            api.setDepth(20);
            api.clearKeys();

            // Hold at 20m for 5 dive-minutes: 5*60/1.5 = 200 frames at dt=0.5
            for (var i = 0; i < 200; i++) {
                api.setDepth(20);
                api.updateDiving(0.5);
                if (api.gameState !== 'diving') {
                    return 'FAIL — Game ended during hold: ' + api.gameState + ' — ' + api.gameOverReason;
                }
            }

            assert(api.maxDepth >= 20, 'maxDepth should be >= 20, got ' + api.maxDepth);

            // Move to 5m (safety stop zone: 4-6m)
            api.setDepth(5);
            // Run a few frames at 5m
            for (var j = 0; j < 10; j++) {
                api.setDepth(5);
                api.updateDiving(0.033);
            }

            assert(api.safetyStopNeeded === true, 'safetyStopNeeded should be true');

            return 'PASS — After 5min at 20m, moved to 5m: safetyStopNeeded=' + api.safetyStopNeeded + ', remaining=' + api.safetyStopRemaining.toFixed(0) + 's';
        }
    },
    // ----------------------------------------------------------
    // TC-10: Barotrauma — Forced rapid ascent
    // ----------------------------------------------------------
    {
        id: 'TC-10',
        name: 'Barotrauma — forced >18m/min ascent',
        fn: function() {
            setupDive([[0.21, 0, 200]]);
            api.setDepth(50);
            api.clearKeys();
            // Run one frame to establish prevDepth
            api.updateDiving(0.033);

            // Force rapid ascent by manipulating depth between frames.
            // Each frame: set depth lower than previous, so updateDiving computes high ascentRate.
            // dt=0.033 real → dtDive = 0.099 sec = 0.00165 min
            // To get ascentRate > 18 m/min, need (prevDepth - newDepth) / 0.00165 > 18
            // → depth change > 0.0297 m/frame. Use 0.5m/frame → ascentRate ≈ 303 m/min
            var currentD = 50;
            var stepPerFrame = 0.5; // m per frame — massive ascent rate
            var triggered = false;

            for (var i = 0; i < 300; i++) {
                currentD = Math.max(0, currentD - stepPerFrame);
                api.setDepth(currentD);
                api.updateDiving(0.033);

                    triggered = true;
                    break;
                }
                if (currentD <= 0) break;
            }

            if (!triggered) {
                // Check if barotraumaTime accumulated even if not quite triggered
                var bt = api.barotraumaTime;
                // If we ran 100 frames at 0.5m/frame from 50m → reaching 0m in 100 frames

                return 'FAIL — Barotrauma not triggered. barotraumaTime=' + bt.toFixed(2) + ', ascentRate=' + api.ascentRate.toFixed(1);
            }

            assert(api.gameOverReason.indexOf('BAROTRAUMA') >= 0 || api.gameOverReason.indexOf('PNEUMOTHORAX') >= 0,
                'Reason should mention BAROTRAUMA/PNEUMOTHORAX, got: ' + api.gameOverReason);

            var newFloor = api.floorAt(newX);
            assert(newX > 0, 'diverX should increase when kicking right, got ' + newX.toFixed(2));
            assert(newFloor > 3, 'Floor at new position should be deeper than 3m (entry), got ' + newFloor.toFixed(2));

            api.diveSite = 'open';
            return 'PASS — after kicking right: x=' + newX.toFixed(1) + 'm, floor=' + newFloor.toFixed(1) + 'm';
        }
    },
    // ----------------------------------------------------------
    // TC-49: Step 1 Shore — no shark spawns on shore site
    // ----------------------------------------------------------
    {
        id: 'TC-49',
        name: 'Step 1 Shore — noShark: shark never spawns on shore',
        fn: function() {
            api.diveMode = 'rec';
            setupDive([[0.21, 0, 200]]);
            api.diveSite = 'shore';
            api.setDepth(10);
            api.shark = null;
            api.sharkTimer = 0.01;
            api.clearKeys();

            // Force spawn attempt with random that would normally trigger shark
            var win = document.getElementById('gameFrame').contentWindow;
            var orig = win.Math.random;
            win.Math.random = function() { return 0.004; };
            try {
                api.updateDiving(0.1);
            } finally {
                win.Math.random = orig;
            }

            assert(api.shark === null, 'Shore site should suppress shark spawn, got: ' + JSON.stringify(api.shark));

            api.diveSite = 'open';
            return 'PASS — noShark=true prevents spawn on shore';
        }
    },
    // ----------------------------------------------------------
    // TC-50: Step 2 Reef — D7 redesign: crest body blocks, both sides open
    // ----------------------------------------------------------
    {
        id: 'TC-50',
        name: 'Step 2 Reef — reef crest blocks lateral movement; both sides open to MAX_DEPTH',
        fn: function() {
            api.diveMode = 'rec';
            setupDive([[0.21, 0, 200]]);
            api.diveSite = 'reef';

            // Trapezoid mesa: at d=25 the right flank seabed reaches x≈11.2
            // (floorAt(11.2)=25). Kicking left from open water (x=40) the diver
            // is blocked by `depth > floorAt(x)` before entering the wall.
            api.diverX = 40;
            api.setDepth(25);
            api.clearKeys();
            api.setKeys({ a: true });  // kick left toward the reef flank
            for (var i = 0; i < 100; i++) {
                api.setDepth(25);
                api.updateDiving(0.033);
            }
            api.clearKeys();

            var x = api.diverX;
            assert(x >= 11, 'diverX should stop at the reef flank (x~11.2 at d=25), got ' + x.toFixed(2));
            assert(x < 40, 'diverX should have moved left from 40, got ' + x.toFixed(2));

            // Both sides open to MAX_DEPTH
            assert(api.floorAt(-50) >= 200, 'Left side floor should be >= 200m (open), got ' + api.floorAt(-50).toFixed(0));
            assert(api.floorAt(50)  >= 200, 'Right side floor should be >= 200m (open), got ' + api.floorAt(50).toFixed(0));

            api.diveSite = 'open';
            return 'PASS — crest blocked at x=' + x.toFixed(2) + '; both sides open (left=' + api.floorAt(-50).toFixed(0) + 'm, right=' + api.floorAt(50).toFixed(0) + 'm)';
        }
    },
    // ----------------------------------------------------------
    // TC-51: Step 2 Reef — current drifts diver in open water beside reef
    // ----------------------------------------------------------
    {
        id: 'TC-51',
        name: 'Step 2 Reef — current drifts diver in open water beside reef',
        fn: function() {
            api.diveMode = 'rec';
            setupDive([[0.21, 0, 200]]);
            api.diveSite = 'reef';
            // x=40, d=20 — open water beside reef, floor=MAX_DEPTH
            api.setDepth(20);
            api.clearKeys();
            api.diverX = 40;

            // Force a rightward current at diver depth
            api.triggerCurrent({ direction: 1, strength: 0.4, depthMin: 10, depthMax: 30, duration: 200 });
            api.current.level = 0.4;

            var x0 = api.diverX;
            for (var j = 0; j < 60; j++) { api.setDepth(20); api.updateDiving(0.033); }
            var x1 = api.diverX;

            assert(x1 > x0 + 0.3, 'Diver should drift right with current beside reef, drift=' + (x1 - x0).toFixed(2));

            api.diveSite = 'open';
            return 'PASS — drifted ' + (x1 - x0).toFixed(2) + 'm with current beside reef';
        }
    },
    // ----------------------------------------------------------
    // TC-52: Step 2 Reef — both sides allow descent to MAX_DEPTH, crest shallow
    // ----------------------------------------------------------
    {
        id: 'TC-52',
        name: 'Step 2 Reef — crest shallow (5m), both sides open to MAX_DEPTH',
        fn: function() {
            api.diveMode = 'rec';
            setupDive([[0.21, 0, 200]]);
            api.diveSite = 'reef';

            // Crest at x=0: floor=5m
            var crestFlr = api.floorAt(0);
            assert(crestFlr <= 6, 'Crest floor at x=0 should be <= 6m, got ' + crestFlr.toFixed(1));

            // Both sides open
            var rightFlr = api.floorAt(150);
            assert(rightFlr >= 200, 'Right side floor at x=150 should be >= 200m, got ' + rightFlr.toFixed(0));
            var leftFlr = api.floorAt(-150);
            assert(leftFlr >= 200, 'Left side floor at x=-150 should be >= 200m, got ' + leftFlr.toFixed(0));

            // No overhead anywhere on reef
            assert(api.ceilingAt(0) === 0, 'Ceiling at crest x=0 should be 0 (open surface)');

            api.diveSite = 'open';
            return 'PASS — crest=' + crestFlr.toFixed(1) + 'm; right=' + rightFlr.toFixed(0) + 'm; left=' + leftFlr.toFixed(0) + 'm';
        }
    },
    // ----------------------------------------------------------
    // TC-53: Step 3 Wreck — overheadAt is true inside hull, false outside
    // ----------------------------------------------------------
    {
        id: 'TC-53',
        name: 'Step 3 Wreck — inOverhead true inside hull, false outside',
        fn: function() {
            api.diveMode = 'rec';
            setupDive([[0.21, 0, 200]]);
            api.diveSite = 'wreck';

            // Inside vehicle deck (x=50, d=33): deck at dTop=30, dBottom=31 above → overhead
            assert(api.overheadAt(50, 33) === true, 'overheadAt(50,33) inside vehicle deck should be true');
            // Outside hull (x=-10, d=35): no structure overhead
            assert(api.overheadAt(-10, 35) === false, 'overheadAt(-10,35) outside hull should be false');
            // Above the top deck (x=50, d=22): no overhead this far up
            assert(api.overheadAt(50, 22) === false, 'overheadAt(50,22) above top deck should be false');

            // Run frames inside the hull so updateOverheadState fires
            api.diverX = 50;
            api.setDepth(33);
            api.clearKeys();
            api.updateDiving(0.033);
            assert(api.inOverhead === true, 'inOverhead should be true after tick inside hull, got ' + api.inOverhead);

            api.diveSite = 'open';
            return 'PASS — overheadAt and inOverhead correct inside/outside wreck hull';
        }
    },
    // ----------------------------------------------------------
    // TC-54: Step 3 Wreck — D8: fast kick near new keel (68m) raises silt
    // ----------------------------------------------------------
    {
        id: 'TC-54',
        name: 'Step 3 Wreck — fast kick near keel inside hull degrades visibility',
        fn: function() {
            api.diveMode = 'rec';
            setupDive([[0.21, 0, 200]]);
            api.diveSite = 'wreck';
            // Hull seabed at 66 m; keel plating spans 65–66 the whole length, so
            // the open bilge a diver can actually swim in is just above it.
            // x=50, d=64.5: in the bilge → floorAt-66 minus depth = 1.5 m so
            // nearFloor is true, the engine-room floor (dBottom 62) is overhead,
            // and there is no solid here (keel starts at 65) so x is free to move.
            api.diverX = 50;
            api.setDepth(64.5);
            api.clearKeys();
            api.updateDiving(0.016);

            assert(api.inOverhead === true, 'Should be inOverhead at x=50 d=64.5 (engine floor overhead)');

            api.setKeys({ d: true });
            var vis0 = api.visibility;
            for (var i = 0; i < 80; i++) {
                api.setDepth(64.5);   // pin depth in the bilge; x free to move
                api.updateDiving(0.033);
            }
            api.clearKeys();
            var vis1 = api.visibility;

            assert(vis1 < vis0, 'Visibility should decrease with fast kick near keel: ' + vis0.toFixed(2) + ' -> ' + vis1.toFixed(2));

            // Stop — visibility should recover
            for (var j = 0; j < 80; j++) {
                api.setDepth(64.5);
                api.updateDiving(0.033);
            }
            var vis2 = api.visibility;
            assert(vis2 > vis1, 'Visibility should recover when calm: ' + vis1.toFixed(2) + ' -> ' + vis2.toFixed(2));

            api.diveSite = 'open';
            return 'PASS — silt: ' + vis0.toFixed(2) + ' (start) -> ' + vis1.toFixed(2) + ' (kick) -> ' + vis2.toFixed(2) + ' (calm)';
        }
    },
    // ----------------------------------------------------------
    // TC-55: (rule-of-thirds HUD removed — placeholder)
    // ----------------------------------------------------------
    {
        id: 'TC-55',
        name: 'Step 3 Wreck — wreck site state resets correctly on new dive',
        fn: function() {
            api.diveMode = 'rec';
            api.diveSite = 'wreck';
            setupDive([[0.21, 0, 200]]);
            assert(api.diveSite === 'wreck', 'diveSite should remain wreck after resetDive');
            assert(api.visibility === 1.0, 'visibility should reset to 1.0, got ' + api.visibility);
            api.diveSite = 'open';
            return 'PASS — wreck site state (diveSite + visibility) resets correctly';
        }
    },
    // ----------------------------------------------------------
    // TC-56: Step 4 Cave — cannot surface inside bad-air dome
    // ----------------------------------------------------------
    {
        id: 'TC-56',
        name: 'Step 4 Cave — badAirWarning true inside dome; ceiling blocks surface attempt',
        fn: function() {
            api.diveMode = 'rec';
            setupDive([[0.21, 0, 200]]);
            api.diveSite = 'cave';

            // Bad-air dome: {x1:103,x2:109,d:12} — ceiling at cave x=106 is 12m
            api.diverX = 106;
            var ceilAt106 = api.ceilingAt(106);
            assert(ceilAt106 > 0, 'Cave ceiling at x=106 (bad-air dome) should be > 0, got ' + ceilAt106);

            // Attempt to ascend to depth 0 — ceiling should block it
            api.setDepth(14);
            api.clearKeys();
            api.setKeys({ w: true });
            for (var i = 0; i < 80; i++) {
                api.diverX = 106;
                api.updateDiving(0.1);
                if (api.gameState !== 'diving') break;
            }
            api.clearKeys();

            assert(api.depth >= ceilAt106 - 0.2, 'Diver should be stopped at cave ceiling, not surface. depth=' + api.depth.toFixed(2) + ' ceil=' + ceilAt106.toFixed(2));
            assert(api.depth > 0.3, 'Diver must not have surfaced inside bad-air dome, depth=' + api.depth.toFixed(2));

            // Run one frame to check badAirWarning
            api.setDepth(12.3);  // just inside the bad-air dome
            api.diverX = 106;
            api.updateDiving(0.016);
            assert(api.badAirWarning === true, 'badAirWarning should be true inside dome, got ' + api.badAirWarning);

            api.diveSite = 'open';
            return 'PASS — bad-air dome: ceiling=' + ceilAt106.toFixed(1) + 'm blocks surface; badAirWarning=true inside';
        }
    },
    // ----------------------------------------------------------
    // TC-57: Step 4 Cave — CAN surface at far-exit pond (x=200)
    // ----------------------------------------------------------
    {
        id: 'TC-57',
        name: 'Step 4 Cave — far-exit pond (x=200): ceiling=0, ceilingAt allows surfacing',
        fn: function() {
            api.diveMode = 'rec';
            setupDive([[0.21, 0, 200]]);
            api.diveSite = 'cave';

            // Far exit geometry: ceiling at x=200 must be 0 (open to air)
            var ceilAt200 = api.ceilingAt(200);
            assert(ceilAt200 === 0, 'Cave ceiling at far-exit x=200 should be 0, got ' + ceilAt200);

            // Contrast: inside cave passage (x=50) ceiling is > 0
            var ceilAt50 = api.ceilingAt(50);
            assert(ceilAt50 > 0, 'Cave ceiling at x=50 should be > 0 (blocked), got ' + ceilAt50);

            // Vertical clamp at x=200: diver at d=0.1 should NOT be clamped to ceiling
            // (since ceilingAt(200)=0, the clamp depth<ceil → 0.1 < 0 is false)
            api.diverX = 200;
            api.setDepth(2);
            api.clearKeys();
            // Accumulate > 0.5 dive-min (needed for post-dive trigger)
            for (var prep = 0; prep < 25; prep++) { api.setDepth(2); api.diverX = 200; api.updateDiving(0.5); }

            // Now ascend
            api.setKeys({ w: true });
            for (var j = 0; j < 300; j++) {
                api.diverX = 200;
                api.updateDiving(0.033);
                if (api.depth < 0.3 || api.gameState !== 'diving') break;
            }
            api.clearKeys();

            assert(api.depth < 0.8 || api.gameState === 'post-dive',
                'Diver should ascend near-surface at far exit; depth=' + api.depth.toFixed(2) + ' state=' + api.gameState);

            api.diveSite = 'open';
            return 'PASS — far exit: ceilAt200=' + ceilAt200 + '; ceilAt50=' + ceilAt50.toFixed(1) + 'm; final depth=' + api.depth.toFixed(2) + 'm';
        }
    },
    // ----------------------------------------------------------
    // TC-58: Step 4 Cave — rule-of-thirds fires inside cave
    // ----------------------------------------------------------
    {
        id: 'TC-58',
        name: 'Step 4 Cave — bad-air dome detected inside unbreathable pocket',
        fn: function() {
            api.diveMode = 'rec';
            setupDive([[0.21, 0, 200]]);
            api.diveSite = 'cave';
            // Bad-air dome: {x1:103,x2:109,d:12}
            api.diverX = 106;
            api.setDepth(11.5);
            api.clearKeys();
            api.updateDiving(0.016);
            assert(api.badAirWarning === true, 'badAirWarning should be true inside dome at x=106,d=11.5');
            api.diverX = 50;
            api.setDepth(17);
            api.updateDiving(0.016);
            assert(api.badAirWarning === false, 'badAirWarning should be false outside dome');
            api.diveSite = 'open';
            return 'PASS — bad-air dome detected correctly at x=106 d=11.5';
        }
    },
    // ----------------------------------------------------------
    // TC-59: Step 4 Cave — guideline lays while overhead
    // ----------------------------------------------------------
    {
        id: 'TC-59',
        name: 'Step 4 Cave — guideline nodes recorded while inOverhead; not recorded in open',
        fn: function() {
            api.diveMode = 'rec';
            setupDive([[0.21, 0, 200]]);
            api.diveSite = 'cave';

            // Inside cave passage at x=50, d=17 (overhead: ceiling ~14m is above diver)
            api.diverX = 50;
            api.setDepth(17);
            api.clearKeys();

            // Confirm overhead
            api.updateDiving(0.016);
            assert(api.inOverhead === true, 'Should be inOverhead inside cave at x=50,d=17, got ' + api.inOverhead);

            var nodesBefore = api.guidelineNodeCount;
            // Run enough frames to accumulate 2+ guideline samples (GUIDELINE_SAMPLE_SEC=1 dive-sec)
            // dt=0.1, TIME_ACCEL=3, dtDiveSec=0.3/frame → need 10+ frames per sample
            // Let's run 50 frames = 15 dive-sec → at least 15 samples expected
            for (var i = 0; i < 50; i++) {
                api.diverX = 50;
                api.setDepth(17);
                api.updateDiving(0.1);
            }
            var nodesAfter = api.guidelineNodeCount;
            assert(nodesAfter > nodesBefore + 1, 'Guideline should accumulate nodes while overhead: before=' + nodesBefore + ' after=' + nodesAfter);

            // Outside cave (entry basin, x=-5, ceiling=0): should NOT record
            api.diveSite = 'open';
            setupDive([[0.21, 0, 200]]);
            api.diveSite = 'open';
            api.diverX = 5;
            api.setDepth(3);
            for (var j = 0; j < 30; j++) { api.setDepth(3); api.updateDiving(0.1); }
            assert(api.guidelineNodeCount === 0, 'No guideline in open water, got ' + api.guidelineNodeCount);

            api.diveSite = 'open';
            return 'PASS — guideline: ' + nodesBefore + ' -> ' + nodesAfter + ' nodes inside cave; 0 in open water';
        }
    },
    // ----------------------------------------------------------
    // TC-X1: Reef descriptor integrity
    // ----------------------------------------------------------
    {
        id: 'TC-X1',
        name: 'Reef descriptor — all new coral/cloud kinds present, geometry correct',
        fn: function() {
            api.diveMode = 'rec';
            setupDive([[0.21, 0, 200]]);
            api.diveSite = 'reef';
            var reef = api.DIVE_SITES.reef;
            var kinds = reef.features.map(function(f) { return f.kind; });
            var required = ['tableCoral','brainCoral','staghorn','softCoral','gorgonian','barrelSponge','anthiasCloud'];
            for (var i = 0; i < required.length; i++) {
                assert(kinds.indexOf(required[i]) !== -1, 'Missing feature kind: ' + required[i]);
            }
            assert(api.floorAt(0) <= 6, 'Crest floor should be <=6m, got ' + api.floorAt(0).toFixed(1));
            // Clean trapezoid mesa: collision is floor-based (no AABB structures).
            // A point inside the flank lies below the seabed; open blue does not.
            assert(api.floorAt(10) < 34, 'x=10 flank should be shallower than 34m (solid below), got ' + api.floorAt(10).toFixed(1));
            assert(api.floorAt(40) >= 200, 'x=40 should be open water to the abyss, got ' + api.floorAt(40).toFixed(0));
            api.diveSite = 'open';
            return 'PASS — all reef feature kinds present, mesa geometry correct';
        }
    },
    // ----------------------------------------------------------
    // TC-X2: New species registered
    // ----------------------------------------------------------
    {
        id: 'TC-X2',
        name: 'New reef species registered in FISH_TYPES and WILDLIFE_TYPES',
        fn: function() {
            var FT = api.FISH_TYPES;
            var WT = api.WILDLIFE_TYPES;
            var fishNames = FT.map(function(f) { return f.name; });
            assert(fishNames.indexOf('anthias') !== -1, 'anthias missing from FISH_TYPES');
            assert(fishNames.indexOf('bannerfish') !== -1, 'bannerfish missing from FISH_TYPES');
            var anthias = FT.filter(function(f) { return f.name === 'anthias'; })[0];
            assert(anthias && anthias.sites && anthias.sites.indexOf('reef') !== -1, 'anthias not reef-only');
            var banner = FT.filter(function(f) { return f.name === 'bannerfish'; })[0];
            assert(banner && banner.sites && banner.sites.indexOf('reef') !== -1, 'bannerfish not reef-only');
            var wldNames = WT.map(function(w) { return w.name; });
            assert(wldNames.indexOf('greyReefShark') !== -1, 'greyReefShark missing from WILDLIFE_TYPES');
            assert(wldNames.indexOf('hammerhead') !== -1, 'hammerhead missing from WILDLIFE_TYPES');
            assert(wldNames.indexOf('dolphin') !== -1, 'dolphin missing from WILDLIFE_TYPES');
            return 'PASS — all new species registered';
        }
    },
    // ----------------------------------------------------------
    // TC-X3: Reef species eligibility filtering
    // ----------------------------------------------------------
    {
        id: 'TC-X3',
        name: 'Reef-only species not eligible on other dive sites',
        fn: function() {
            api.diveMode = 'rec';
            setupDive([[0.21, 0, 200]]);
            api.diveSite = 'wreck';
            var eligible = api.eligibleFishTypes();
            if (eligible.length > 0) {
                var names = eligible.map(function(f) { return f.name; });
                assert(names.indexOf('anthias') === -1, 'anthias should not spawn on wreck site');
                assert(names.indexOf('bannerfish') === -1, 'bannerfish should not spawn on wreck site');
            }
            api.diveSite = 'open';
            return 'PASS — reef-only species not eligible on non-reef sites';
        }
    }
];

// ============================================================
//  TEST RUNNER
// ============================================================

function renderResults() {
    var el = document.getElementById('results');
    var html = '';
    for (var i = 0; i < tests.length; i++) {
        var t = tests[i];
        var r = results[t.id];
        var cls = 'pending';
        var badge = 'PENDING';
        var detail = '';
        if (r) {
            cls = r.pass ? 'pass' : 'fail';
            badge = r.pass ? 'PASS' : 'FAIL';
            detail = r.detail;
        }
        html += '<div class="card ' + cls + '">' +
            '<div class="card-header">' +
            '<span class="card-title">' + t.id + ': ' + t.name + '</span>' +
            '<span class="badge ' + cls + '">' + badge + '</span>' +
            '</div>' +
            (detail ? '<div class="card-detail">' + detail + '</div>' : '') +
            '</div>';
    }
    el.innerHTML = html;
}

function updateSummary() {
    var total = tests.length;
    var passed = 0;
    var failed = 0;
    var pending = 0;
    for (var i = 0; i < tests.length; i++) {
        var r = results[tests[i].id];
        if (!r) { pending++; }
        else if (r.pass) { passed++; }
        else { failed++; }
    }
    var el = document.getElementById('summary');
    if (running) {
        el.innerHTML = '<span class="pending">Running...</span> &nbsp; <span class="pass">' + passed + ' passed</span> &nbsp; <span class="fail">' + failed + ' failed</span> &nbsp; <span class="pending">' + pending + ' pending</span>';
    } else {
        el.innerHTML = '<span class="pass">' + passed + '/' + total + ' passed</span>' +
            (failed > 0 ? ' &nbsp; <span class="fail">' + failed + ' failed</span>' : '') +
            (pending > 0 ? ' &nbsp; <span class="pending">' + pending + ' pending</span>' : '');
    }
}

function runSingleTest(idx) {
    var t = tests[idx];
    results[t.id] = { pass: false, detail: 'Running...' };
    renderResults();
    try {
        var detail = t.fn();
        results[t.id] = { pass: true, detail: detail };
    } catch(e) {
        results[t.id] = { pass: false, detail: e.message };
    }
    renderResults();
    updateSummary();
}

function runAllTests(callback) {
    if (running) return;
    running = true;
    results = {};
    renderResults();
    updateSummary();
    setButtonsDisabled(true);

    var idx = 0;
    function next() {
        if (idx >= tests.length) {
            running = false;
            updateSummary();
            setButtonsDisabled(false);
            // Expose structured results for programmatic access (agent/Playwright)
            var total = tests.length, passed = 0, failed = 0;
            var testResults = [];
            for (var i = 0; i < tests.length; i++) {
                var r = results[tests[i].id];
                var entry = { id: tests[i].id, name: tests[i].name, pass: r ? r.pass : false, detail: r ? r.detail : 'NOT RUN' };
                testResults.push(entry);
                if (r && r.pass) passed++; else failed++;
            }
            window.testResults = { total: total, passed: passed, failed: failed, done: true, tests: testResults };
            if (callback) callback(window.testResults);
            return;
        }
        runSingleTest(idx);
        idx++;
        // Use setTimeout to allow UI repaint between tests
        setTimeout(next, 10);
    }
    next();
}

function setButtonsDisabled(disabled) {
    document.getElementById('btnRunAll').disabled = disabled;
    var btns = document.querySelectorAll('.individual');
    for (var i = 0; i < btns.length; i++) btns[i].disabled = disabled;
}

// ============================================================
//  EVENT BINDINGS
// ============================================================

document.getElementById('btnRunAll').addEventListener('click', runAllTests);

var indivBtns = document.querySelectorAll('.individual');
for (var i = 0; i < indivBtns.length; i++) {
    (function(idx) {
        indivBtns[idx].addEventListener('click', function() {
            if (running) return;
            running = true;
            setButtonsDisabled(true);
            runSingleTest(idx);
            running = false;
            updateSummary();
            setButtonsDisabled(false);
        });
    })(i);
}

// Initial render
renderResults();

// Expose testResults early (not done yet)
window.testResults = { total: tests.length, passed: 0, failed: 0, done: false, tests: [] };

// Auto-run when ?autorun is in the URL (for agent/Playwright invocation)
if (window.location.search.indexOf('autorun') !== -1) {
    iframe.addEventListener('load', function autoRun() {
        iframe.removeEventListener('load', autoRun);
        // Small delay to ensure gameAPI is ready
        setTimeout(function() { runAllTests(); }, 100);
    });
}
</script>
